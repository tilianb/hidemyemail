name: Docs

# Builds the Astro Starlight site in website/ (content synced from docs/,
# README, CHANGELOG, ROADMAP) and publishes it to GitHub Pages.
# Enable once in repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    # Publish from main so the public site reflects released software.
    # Edits still flow through dev (per-page "Edit page" links target dev).
    branches: ["main"]
    paths:
      - "website/**"
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"
permissions: {}

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build (syncs docs, then astro build)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: website/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
