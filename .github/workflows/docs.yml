name: Docs

# Builds the Astro Starlight site in website/ (content synced from docs/,
# README, CHANGELOG, ROADMAP) and publishes it to GitHub Pages.
# Enable once in repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    # Publish from main so the public site reflects released software.
    # Edits still flow through dev (per-page "Edit page" links target dev).
    branches: ["main"]
    paths:
      - "website/**"
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build (syncs docs, then astro build)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
