name: Android

on:
  push:
    branches: [ "main" ]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
      - '!**.md'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
      - '!**.md'

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & Lint (Debug)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build, lint & test
        run: ./gradlew assembleDebug lintDebug testDebugUnitTest

      - name: Name debug APK
        id: apk
        run: |
          version=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts)
          name="HideMyEmail-v${version}-debug.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/$name"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.apk.outputs.name }}
          path: android/app/build/outputs/apk/debug/${{ steps.apk.outputs.name }}
          if-no-files-found: error
