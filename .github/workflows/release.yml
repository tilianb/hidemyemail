name: Release

on:
  push:
    tags:
      - "v*.*.*"
permissions: {}

jobs:
  publish-gate:
    name: Verify publish ref
    runs-on: ubuntu-latest
    outputs:
      stable-release: ${{ steps.ref.outputs.stable-release }}
    permissions:
      contents: read
    steps:
      - name: Checkout protected history
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - name: Require a release tag from main
        id: ref
        run: |
          tag="$GITHUB_REF_NAME"
          [[ "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || exit 1
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          echo "stable-release=true" >> "$GITHUB_OUTPUT"

  release:
    name: Create GitHub Release
    needs: publish-gate
    if: needs.publish-gate.result == 'success' && needs.publish-gate.outputs.stable-release == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Resolve validated tag
        id: tag
        run: |
          tag="$GITHUB_REF_NAME"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi
          
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping creation."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Decrypt Keystore
        env:
          ANDROID_KEYSTORE_DECRYPT_PASS: ${{ secrets.ANDROID_KEYSTORE_DECRYPT_PASS }}
        run: |
          cd android
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 -in release.keystore.enc -out release.keystore -k "$ANDROID_KEYSTORE_DECRYPT_PASS"

      # Firebase config enables FCM push in the shipped APK. Written from a
      # secret so release builds include it; absent on forks/PRs, where the
      # app still builds (push reported unavailable) — see android/README.md.
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "Wrote android/app/google-services.json — FCM push enabled."
          else
            echo "GOOGLE_SERVICES_JSON secret not set — building without Firebase (push disabled)."
          fi

      - name: Build Android Release APK
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload Android APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          apk_name="HideMyEmail-${TAG}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "$apk_name"
          gh release upload "$TAG" "$apk_name" --clobber
