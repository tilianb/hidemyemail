name: Docker

# Builds the self-host container.
# - PRs and pushes to dev: validate linux/amd64 only (no push), GHA cache keeps iteration fast.
# - Push to main: build + push multi-arch :latest, :main, :sha-<short> to GHCR.
# - Stable SemVer tag vX.Y.Z: build the exact tagged commit; push release tags to GHCR + Docker Hub.

on:
  push:
    branches: ['main']
    tags: ["v*.*.*"]
    paths:
      - "docker/**"
      - "worker/**"
      - "dashboard/**"
      - ".github/workflows/docker.yml"
      - "!**.md"
  pull_request:
    paths:
      - "docker/**"
      - "worker/**"
      - "dashboard/**"
      - ".github/workflows/docker.yml"
      - "!**.md"
permissions: {}

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: docker.io/${{ github.repository_owner }}/hidemyemail

jobs:
  publish-gate:
    name: Verify publish ref
    runs-on: ubuntu-latest
    outputs:
      stable-release: ${{ steps.ref.outputs.stable-release }}
    permissions:
      contents: read
    steps:
      - name: Checkout protected history
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - name: Require main or a release tag from main
        id: ref
        run: |
          echo "stable-release=false" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_EVENT_NAME" != "push" ]]; then exit 0; fi
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then exit 0; fi
          tag="${GITHUB_REF#refs/tags/}"
          [[ "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || exit 1
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          echo "stable-release=true" >> "$GITHUB_OUTPUT"

  build:
    name: Build & Push by Digest
    needs: publish-gate
    permissions:
      contents: read
      packages: write
    environment: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || needs.publish-gate.outputs.stable-release == 'true')) && 'production' || null }}
    strategy:
      matrix:
        # Validation-only runs (PRs, dev pushes) build linux/amd64 only; main pushes build both.
        include: ${{ (github.event_name == 'pull_request' || github.ref == 'refs/heads/dev') && fromJSON('[{"os":"ubuntu-latest","platform":"linux/amd64"}]') || fromJSON('[{"os":"ubuntu-latest","platform":"linux/amd64"},{"os":"ubuntu-24.04-arm","platform":"linux/arm64"}]') }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Log in to Docker Hub
        if: needs.publish-gate.outputs.stable-release == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && github.ref != 'refs/heads/dev'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          labels: |
            org.opencontainers.image.title=hidemyemail
            org.opencontainers.image.description=Self-host container for hidemyemail.dev (Worker via Miniflare)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build for validation
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/dev'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          push: false
          cache-from: type=gha,scope=build-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform }}
          provenance: true
          sbom: true

      - name: Build and push by digest
        if: github.event_name != 'pull_request' && github.ref != 'refs/heads/dev'
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Docker Hub only receives release (tag) builds; main/sha stay on GHCR.
          outputs: |
            type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true
            ${{ needs.publish-gate.outputs.stable-release == 'true' && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', env.DOCKERHUB_IMAGE) || '' }}
          cache-from: type=gha,scope=build-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform }}
          # Disabled: attestation manifests break push-by-digest manifest merge
          # (different index digest per registry; outputs.digest reports only one).
          provenance: false
          sbom: false

      - name: Export digest
        if: github.event_name != 'pull_request' && github.ref != 'refs/heads/dev'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request' && github.ref != 'refs/heads/dev'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge Multi-Arch Manifests
    if: github.event_name != 'pull_request' && github.ref != 'refs/heads/dev'
    runs-on: ubuntu-latest
    needs: [publish-gate, build]
    permissions:
      contents: read
      packages: write
    environment:
      name: production
      url: https://app.hidemyemail.dev
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Log in to Docker Hub
        if: needs.publish-gate.outputs.stable-release == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR: full set — branch (main), sha, semver, and latest on main.
      - name: Extract GHCR metadata
        id: meta-ghcr
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.GHCR_IMAGE }}
          flavor: latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      # Docker Hub: releases only — semver tags + latest on newest release. No main/branch/sha.
      - name: Extract Docker Hub metadata
        id: meta-dockerhub
        if: needs.publish-gate.outputs.stable-release == 'true'
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          flavor: latest=auto
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Create GHCR manifest list and push
        working-directory: /tmp/digests
        env:
          META_JSON: ${{ steps.meta-ghcr.outputs.json }}
        run: |
          mapfile -t tags < <(jq -r --arg image '${{ env.GHCR_IMAGE }}' '.tags[] | select(startswith($image + ":")) | "-t", .' <<< "$META_JSON")
          mapfile -t digests < <(printf '${{ env.GHCR_IMAGE }}@sha256:%s\n' *)
          docker buildx imagetools create "${tags[@]}" "${digests[@]}"

      - name: Create Docker Hub manifest list and push
        if: needs.publish-gate.outputs.stable-release == 'true'
        working-directory: /tmp/digests
        env:
          META_JSON: ${{ steps.meta-dockerhub.outputs.json }}
        run: |
          mapfile -t tags < <(jq -r --arg image '${{ env.DOCKERHUB_IMAGE }}' '.tags[] | select(startswith($image + ":")) | "-t", .' <<< "$META_JSON")
          mapfile -t digests < <(printf '${{ env.DOCKERHUB_IMAGE }}@sha256:%s\n' *)
          docker buildx imagetools create "${tags[@]}" "${digests[@]}"

      - name: Inspect GHCR image
        run: |
          docker buildx imagetools inspect ${{ env.GHCR_IMAGE }}:${{ steps.meta-ghcr.outputs.version }}

      - name: Inspect Docker Hub image
        if: needs.publish-gate.outputs.stable-release == 'true'
        run: |
          docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta-dockerhub.outputs.version }}
