name: Docker

# Builds the self-host container for linux/amd64 + linux/arm64.
# - PRs: build only (no push), uses GHA cache to keep iteration fast.
# - Push to main: build + push :latest, :main, :sha-<short>.
# - Tag v*.*.*: build + push :vX.Y.Z, :vX.Y, :vX, :latest.

on:
  push:
    branches: ['**']
    tags: ["v*.*.*"]
    paths:
      - "docker/**"
      - "worker/**"
      - "dashboard/**"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: ['**']
    paths:
      - "docker/**"
      - "worker/**"
      - "dashboard/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag strategy:
          #   - main branch → :latest, :main
          #   - semver tag v1.2.3 → :1.2.3, :1.2, :1, :latest
          #   - any push     → :sha-<short>
          #   - PRs          → :pr-<num> (used as build target name only, never pushed)
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          labels: |
            org.opencontainers.image.title=hidemyemail
            org.opencontainers.image.description=Self-host container for hidemyemail.dev (Worker via Miniflare)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA-backed remote cache keeps multi-arch rebuilds fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Image digest
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "Digest: $DIGEST"
          echo "Tags pushed:"
          printf '  - %s\n' $TAGS
