name: TestFlight

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  publish-gate:
    name: Verify publish ref
    runs-on: ubuntu-latest
    outputs:
      stable-release: ${{ steps.ref.outputs.stable-release }}
    permissions:
      contents: read
    steps:
      - name: Checkout protected history
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - name: Require a release tag from main
        id: ref
        run: |
          tag="$GITHUB_REF_NAME"
          [[ "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || exit 1
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          echo "stable-release=true" >> "$GITHUB_OUTPUT"

  testflight:
    name: Upload to TestFlight
    needs: publish-gate
    if: needs.publish-gate.result == 'success' && needs.publish-gate.outputs.stable-release == 'true'
    runs-on: macos-15
    environment: production
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Github.mobileprovision

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd ios
          xcodegen generate

      - name: Build Archive
        run: |
          cd ios
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            VERSION="1.0.0" # Fallback for manual branch triggers
          fi
          xcodebuild archive \
            -project HideMyEmail.xcodeproj \
            -scheme HideMyEmail \
            -configuration Release \
            -archivePath $PWD/build/HideMyEmail.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER=Github \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            MARKETING_VERSION=$VERSION

      - name: Export IPA
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath $PWD/build/HideMyEmail.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build

      - name: Setup App Store Connect API Key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Upload to TestFlight
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          cd ios/build
          set -o pipefail
          xcrun altool --upload-app -f HideMyEmail.ipa -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" 2>&1 | tee altool.log
          if grep -qE 'ERROR:|Failed to upload' altool.log; then
            echo "altool reported an upload failure." >&2
            exit 1
          fi
