services:
  worker:
    command: npm --prefix dashboard run build && cd worker && npx wrangler dev --ip 0.0.0.0 --port "$PORT"
    port: 8787
  dashboard:
    command: cd dashboard && npm run dev -- --host 0.0.0.0 --port "$PORT"
    portal:
      title: HideMyEmail
      description: Run `cat .amp/dev-login.txt` in the Terminal for the local passphrase.
