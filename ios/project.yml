# XcodeGen project definition.
#
# This repo intentionally does NOT commit a hand-written .xcodeproj — that file
# is huge, merge-hostile, and easy to corrupt. Instead we declare the project
# here and generate it deterministically:
#
#   brew install xcodegen     # one time
#   cd ios && xcodegen generate
#   open HideMyEmail.xcodeproj
#
# See ios/README.md for the full setup walkthrough.

name: HideMyEmail
options:
  bundleIdPrefix: dev.hidemyemail
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "3L2C79636P" # Apple Developer Team ID (override in Xcode signing if needed)
    CODE_SIGN_STYLE: Automatic

targets:
  HideMyEmail:
    type: application
    platform: iOS
    sources:
      - path: HideMyEmail
    info:
      path: HideMyEmail/Info.plist
      properties:
        CFBundleDisplayName: HideMyEmail
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - BricolageGrotesque-Regular.ttf
          - BricolageGrotesque-Medium.ttf
          - BricolageGrotesque-SemiBold.ttf
          - BricolageGrotesque-Bold.ttf
          - IBMPlexSans-Regular.ttf
          - IBMPlexSans-Medium.ttf
          - IBMPlexSans-SemiBold.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.hidemyemail.app
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        # Passkeys: associates the app with app.hidemyemail.dev (see the Worker's
        # /.well-known/apple-app-site-association). Requires a real Apple Team ID
        # and the Associated Domains capability on the App ID for device builds.
        CODE_SIGN_ENTITLEMENTS: HideMyEmail/HideMyEmail.entitlements

  HideMyEmailTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HideMyEmailTests
    dependencies:
      - target: HideMyEmail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.hidemyemail.app.tests
        GENERATE_INFOPLIST_FILE: YES
        # Hosted by the app so `@testable import HideMyEmail` can reach the
        # app's types.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HideMyEmail.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HideMyEmail"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  HideMyEmail:
    build:
      targets:
        HideMyEmail: all
        HideMyEmailTests: [test]
    test:
      targets:
        - HideMyEmailTests
